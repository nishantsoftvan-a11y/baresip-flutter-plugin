name: baresip_flutter
description: "A Flutter plugin that bridges the BareSip SIP SDK to Dart via MethodChannel and EventChannel."
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.sip.baresip.flutter
        pluginClass: BareSipFlutterPlugin
